name: Build Release

on:
  push:
    tags:
      - '*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller Falcon-PAD.spec
      - run: Compress-Archive -Path dist/Falcon-PAD/* -DestinationPath Falcon-PAD-Windows.zip
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: FalconPad-Windows
          path: Falcon-PAD-Windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller Falcon-PAD.spec
      - run: tar -czf Falcon-PAD-Linux.tar.gz -C dist/Falcon-PAD .
      - uses: actions/upload-artifact@v4
        with:
          name: FalconPad-Linux
          path: Falcon-PAD-Linux.tar.gz

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            FalconPad-Windows/Falcon-PAD-Windows.zip
            FalconPad-Linux/Falcon-PAD-Linux.tar.gz
