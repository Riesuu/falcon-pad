name: Build Release

on:
  push:
    tags:
      - '*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller Falcon-PAD.spec
      - uses: actions/upload-artifact@v4
        with:
          name: FalconPad-Windows
          path: dist/Falcon-PAD.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller Falcon-PAD.spec
      - run: chmod +x dist/Falcon-PAD
      - uses: actions/upload-artifact@v4
        with:
          name: FalconPad-Linux
          path: dist/Falcon-PAD

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - run: |
          mv FalconPad-Windows/Falcon-PAD.exe Falcon-PAD-Windows.exe
          mv FalconPad-Linux/Falcon-PAD Falcon-PAD-Linux
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            Falcon-PAD-Windows.exe
            Falcon-PAD-Linux
