name: Build Release

on:
  push:
    tags:
      - '*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller FalconPad.spec
      - uses: actions/upload-artifact@v4
        with:
          name: FalconPad-Windows
          path: dist/FalconPad.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller FalconPad.spec
      - run: chmod +x dist/FalconPad
      - uses: actions/upload-artifact@v4
        with:
          name: FalconPad-Linux
          path: dist/FalconPad

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - run: |
          mv FalconPad-Windows/FalconPad.exe FalconPad-Windows.exe
          mv FalconPad-Linux/FalconPad FalconPad-Linux
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            FalconPad-Windows.exe
            FalconPad-Linux
